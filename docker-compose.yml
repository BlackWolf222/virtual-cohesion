services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: virtual_cohesion
      POSTGRES_USER: vc_user
      POSTGRES_PASSWORD: vc_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vc_user -d virtual_cohesion"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_DB: virtual_cohesion
      POSTGRES_USER: vc_user
      POSTGRES_PASSWORD: vc_password
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost
    depends_on:
      db:
        condition: service_healthy
    # seed_demo creates tenant domain demo.localhost (required for http://demo.localhost/*)
    command: sh -c "python manage.py makemigrations companies accounts surveys matching meetings analytics_app && python manage.py migrate_schemas --shared && python manage.py migrate_schemas && python manage.py seed_demo && gunicorn backend.wsgi:application --bind 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: /api
    command: sh -c "npm install && npm run build && npm run preview -- --host 0.0.0.0 --port 4173"

  nginx:
    image: nginx:1.27
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
